# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

requiredVersions:
    extensions:
        azure.ai.agents: '>=1.0.0-beta.4'
name: homework-tutor
services:
    ai-project:
        host: azure.ai.project
        deployments:
            - model:
                format: OpenAI
                name: gpt-5.4-mini
                version: "2026-03-17"
              name: gpt-5.4-mini
              sku:
                capacity: 10
                name: GlobalStandard
    homework-tutor:
        project: src/hello-world-dotnet-agent-framework
        host: azure.ai.agent
        language: csharp
        uses:
            - ai-project
        codeConfiguration:
            entryPoint: hello-world.dll
            runtime: dotnet_10
        container:
            resources:
                cpu: "0.5"
                memory: 1Gi
        description: An EDU homework tutor hosted on Microsoft Foundry that gives guided, pedagogy-aware support to students, preferring hints and step-by-step explanations over direct answers and grounding responses in approved course knowledge.
        displayName: EDU Homework Tutor
        environmentVariables:
            - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
              value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
            - name: PEDAGOGY_POLICY_BLOB_URL
              value: ${PEDAGOGY_POLICY_BLOB_URL}
            - name: POLICY_REFRESH_MARKER
              value: ${POLICY_REFRESH_MARKER}
        kind: hosted
        metadata:
            tags:
                - AI Agent Hosting
                - Responses Protocol
                - Agent Framework
                - .NET
        name: homework-tutor
        protocols:
            - protocol: responses
              version: 2.0.0
infra:
    provider: microsoft.foundry
